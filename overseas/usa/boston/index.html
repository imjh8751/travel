<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>보스턴 3박4일 일정표</title>
<style>
body{font-family:Arial,sans-serif;margin:0;background:#f6f8fb;color:#1c2430} .wrap{max-width:1100px;margin:auto;padding:16px}
.card{background:#fff;border:1px solid #dde3ee;border-radius:14px;padding:14px;margin-top:12px}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:10px}
.span6{grid-column:span 6}.span12{grid-column:span 12} table{width:100%;border-collapse:collapse;font-size:14px}th,td{padding:8px;border-bottom:1px solid #e6ebf3;text-align:left}
.btn{border:1px solid #c7d3e7;background:#fff;padding:8px 10px;border-radius:10px;cursor:pointer} .btn.on{background:#1459b8;color:#fff}
.small{font-size:12px;color:#667892} @media(max-width:860px){.span6{grid-column:span 12}}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1 id="title" style="margin:0 0 8px"></h1>
    <div id="summary" class="small"></div>
    <div id="tags" style="margin-top:8px"></div>
    <a id="route" target="_blank">🗺️ 전체 동선</a>
  </div>

  <div class="card">
    <button class="btn on" onclick="setTheme('essential',this)">필수 동선</button>
    <button class="btn" onclick="setTheme('relaxed',this)">여유 동선</button>
    <button class="btn" onclick="setTheme('foodie',this)">맛집 동선</button>
  </div>

  <div class="card">
    <h2 style="margin:0 0 8px">📅 일정표</h2>
    <table><thead><tr><th>일차</th><th>시간</th><th>일정</th><th>이동/팁</th><th>지도</th></tr></thead><tbody id="rows"></tbody></table>
  </div>

  <div class="grid">
    <div class="card span6"><h2 style="margin:0 0 8px">🍽️ 맛집 비교</h2><div id="foods"></div></div>
    <div class="card span6"><h2 style="margin:0 0 8px">🎁 대상별 선물(텍스트형)</h2><div id="gifts"></div></div>
    <div class="card span6"><h2 style="margin:0 0 8px">🛍️ 기념품 상점 비교</h2><div id="souvenirs"></div></div>
    <div class="card span6"><h2 style="margin:0 0 8px">🚇 교통</h2><div id="transport"></div></div>
  </div>

  <div class="card small">최신 확인일: <span id="updated"></span> · 출처: <span id="sources"></span></div>
</div>
<script>
let page,itinerary,foods,souvenirs,gifts,transport,sources,current='essential';
const q=s=>document.querySelector(s);
async function load(){
 [page,itinerary,foods,souvenirs,gifts,transport,sources]=await Promise.all([
  fetch('./data/page.json').then(r=>r.json()),fetch('./data/itinerary.json').then(r=>r.json()),fetch('./data/foods.json').then(r=>r.json()),
  fetch('./data/souvenirs.json').then(r=>r.json()),fetch('./data/recipient-gifts.json').then(r=>r.json()),fetch('./data/transport.json').then(r=>r.json()),fetch('./data/sources.json').then(r=>r.json())
 ]);
 q('#title').textContent=`${page.city} ${page.tripLength} 신규 일정표`;
 q('#summary').textContent=page.summary;
 q('#tags').textContent=(page.tags||[]).join(' · ');
 q('#updated').textContent=page.updatedAt;
 q('#sources').innerHTML=(sources.sources||[]).map(s=>`<a target="_blank" href="${s.url}">${s.name}</a>`).join(' / ');
 render();
}
function setTheme(t,el){current=t;document.querySelectorAll('.btn').forEach(b=>b.classList.remove('on'));el.classList.add('on');render();}
function render(){
 q('#route').href=page.routeUrlByTheme[current]||page.routeUrlByTheme.all;
 const list=itinerary.filter(x=>current==='all'||x.themes.includes(current));
 q('#rows').innerHTML=list.map(x=>`<tr><td>${x.day}</td><td>${x.time}</td><td>${x.title}</td><td>${x.moveNote}<br><span class='small'>${x.tip}</span></td><td><a target='_blank' href='${x.mapUrl}'>지도</a></td></tr>`).join('');
 q('#foods').innerHTML=(foods.foods||[]).filter(x=>current==='all'||x.themes.includes(current)).map(x=>`<div style='margin-bottom:8px'><b>${x.name}</b> · ${x.menu} · ${x.price}<br><a target='_blank' href='${x.mapUrl}'>지도</a> / <a target='_blank' href='${x.reviewUrl}'>리뷰</a></div>`).join('');
 q('#souvenirs').innerHTML=(souvenirs.souvenirs||[]).map(s=>`<div style='margin-bottom:8px'><b>${s.name}</b> (${s.price})<br>${s.shopOptions.map(o=>`- <a target='_blank' href='${o.mapUrl}'>${o.shop}</a> (${o.price})`).join('<br>')}</div>`).join('');
 q('#gifts').innerHTML=(gifts.gifts||[]).map(g=>`<div style='margin-bottom:8px'><b>${g.recipient}</b>: ${g.items.join(', ')} · ${g.budget}<br><span class='small'>${g.note}</span></div>`).join('');
 q('#transport').innerHTML=`공항↔도심: ${transport.airportToCity}<br>결제: ${transport.payment}<ul>${(transport.tips||[]).map(t=>`<li>${t}</li>`).join('')}</ul><a target='_blank' href='${transport.officialUrl}'>공식 링크</a>`;
}
load();
</script>
</body></html>

<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>보스턴 3박 4일 근거형 여행 가이드</title>
<style>
:root{--bg:#f5f7fb;--card:#fff;--line:#dce4ef;--ink:#172033;--muted:#647086;--brand:#0b5cab}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;background:var(--bg);color:var(--ink)}
a{color:var(--brand);text-decoration:none}a:hover{text-decoration:underline}.wrap{max-width:1100px;margin:auto;padding:16px}
.hero,.section{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px;margin-bottom:14px}.hero{background:linear-gradient(135deg,#0b5cab,#d95b43);color:#fff}.chips,.themes,.grid2{display:flex;gap:8px;flex-wrap:wrap}.chip,.btn{padding:8px 11px;border-radius:999px;font-size:13px;font-weight:700}.chip{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.25)}
.btn{border:1px solid var(--line);background:#fff;color:var(--ink);cursor:pointer}.btn.on{background:var(--brand);color:#fff;border-color:var(--brand)}
.grid{display:grid;grid-template-columns:repeat(12,minmax(0,1fr));gap:12px}.span6{grid-column:span 6}.span12{grid-column:span 12}
.card{border:1px solid var(--line);border-radius:14px;padding:12px}.small{font-size:12px;color:var(--muted)} h1,h2,h3{margin:0 0 8px} table{width:100%;border-collapse:collapse;font-size:14px}th,td{padding:8px;border-bottom:1px solid #e8edf5;vertical-align:top;text-align:left}th{background:#f3f7fc} ul{margin:8px 0 0;padding-left:18px}
@media(max-width:860px){.span6{grid-column:span 12}}
</style>
</head>
<body>
<div class="wrap">
  <section class="hero">
    <div class="small" id="eyebrow">Boston</div>
    <h1 id="title">보스턴 3박 4일 근거형 여행 가이드</h1>
    <p id="summary" style="margin:0 0 12px"></p>
    <div id="tags" class="chips"></div>
    <div style="margin-top:14px" class="themes">
      <button class="btn on" data-theme="essential">필수 동선</button>
      <button class="btn" data-theme="relaxed">여유 동선</button>
      <button class="btn" data-theme="foodie">맛집 동선</button>
      <a id="routeLink" class="btn" target="_blank">🗺️ 테마별 구글맵 동선</a>
      <button class="btn" id="pdfBtn" type="button">🧾 현재 테마 PDF 저장</button>
    </div>
  </section>

  <section class="section">
    <h2>📅 일정표</h2>
    <div class="small">테마를 바꾸면 일정표와 동선 링크가 함께 바뀝니다.</div>
    <table>
      <thead><tr><th>일차</th><th>시간</th><th>장소</th><th>핵심 행동</th><th>이동/팁</th><th>지도</th></tr></thead>
      <tbody id="itineraryRows"></tbody>
    </table>
  </section>

  <section class="section">
    <div class="grid">
      <div class="span6 card">
        <h2>🍽️ 맛집 추천</h2>
        <div id="foods"></div>
      </div>
      <div class="span6 card">
        <h2>🛍️ 기념품 추천</h2>
        <div id="souvenirs"></div>
      </div>
      <div class="span6 card">
        <h2>🎁 대상별 선물</h2>
        <div id="gifts"></div>
      </div>
      <div class="span6 card">
        <h2>🏨 숙소 구역</h2>
        <div id="hotels"></div>
      </div>
      <div class="span6 card">
        <h2>☔ 현지 날씨</h2>
        <div id="weather"></div>
      </div>
      <div class="span6 card">
        <h2>✅ 체크리스트</h2>
        <div id="checklist"></div>
      </div>
      <div class="span12 card">
        <h2>🚇 교통 / 준비 메모</h2>
        <div id="transport"></div>
      </div>
      <div class="span12 card">
        <h2>🔎 근거 링크</h2>
        <div id="sources" class="themes"></div>
      </div>
    </div>
  </section>
</div>
<script>
let state={theme:'essential'};
const $=s=>document.querySelector(s);
async function load(){
  const [page,itinerary,foods,souvenirs,gifts,hotels,transport,sources,weather,checklist]=await Promise.all([
    fetch('./data/page.json').then(r=>r.json()),
    fetch('./data/itinerary.json').then(r=>r.json()),
    fetch('./data/foods.json').then(r=>r.json()),
    fetch('./data/souvenirs.json').then(r=>r.json()),
    fetch('./data/recipient-gifts.json').then(r=>r.json()),
    fetch('./data/hotels.json').then(r=>r.json()),
    fetch('./data/transport.json').then(r=>r.json()),
    fetch('./data/sources.json').then(r=>r.json()),
    fetch('./data/weather.json').then(r=>r.json()),
    fetch('./data/checklist.json').then(r=>r.json())
  ]);
  Object.assign(state,{page,itinerary,foods:foods.foods||[],souvenirs:souvenirs.souvenirs||[],gifts:gifts.gifts||[],hotels:hotels.districts||[],transport,sources:sources.sources||[],weather,checklist:checklist.items||[]});
  $('#eyebrow').textContent=`${page.city} · ${page.tripLength} · updated ${page.updatedAt}`;
  $('#summary').textContent=page.summary;
  $('#tags').innerHTML=(page.tags||[]).map(t=>`<span class="chip">${t}</span>`).join('');
  document.querySelectorAll('[data-theme]').forEach(b=>b.onclick=()=>{state.theme=b.dataset.theme;document.querySelectorAll('[data-theme]').forEach(x=>x.classList.toggle('on',x===b));render();});
  $('#pdfBtn').onclick=()=>printThemePdf();
  render();
}
function byTheme(x){return state.theme==='all'||(x.themes||[]).includes(state.theme)}
function render(){
  $('#routeLink').href=state.page.routeUrlByTheme[state.theme]||'#';
  $('#routeLink').textContent=`🗺️ ${document.querySelector('[data-theme].on').textContent} 구글맵 동선`; 
  $('#itineraryRows').innerHTML=state.itinerary.filter(byTheme).map(x=>`<tr><td>${x.day}</td><td>${x.time}</td><td>${x.title}</td><td>${x.action}</td><td>${x.moveNote}<br><span class='small'>${x.tip}</span></td><td><a target='_blank' href='${x.mapUrl}'>지도</a></td></tr>`).join('');
  $('#foods').innerHTML=state.foods.filter(byTheme).map(x=>`<div style='margin-bottom:12px'><b>${x.name}</b> · ${x.menu} · ${x.price}<br><span class='small'>${x.whyPopular||''}</span><br><a target='_blank' href='${x.mapUrl}'>지도</a> / <a target='_blank' href='${x.reviewUrl}'>리뷰</a> / <a target='_blank' href='${x.blogEvidenceLink}'>블로그 근거</a></div>`).join('');
  $('#souvenirs').innerHTML=state.souvenirs.map(x=>`<div style='margin-bottom:12px'><b>${x.name}</b> · ${x.price}<br><span class='small'>${x.whyPopular||''}</span><br>${x.shopOptions.map(s=>`- <a target='_blank' href='${s.mapUrl}'>${s.shop}</a> (${s.price})`).join('<br>')}<br><a target='_blank' href='${x.blogEvidenceLink}'>블로그 근거</a></div>`).join('');
  $('#gifts').innerHTML=state.gifts.map(x=>`<div style='margin-bottom:10px'><b>${x.recipient}</b> · ${x.budget}<br>${x.items.join(', ')}<br><span class='small'>${x.note}</span></div>`).join('');
  $('#hotels').innerHTML=state.hotels.filter(byTheme).map(x=>`<div style='margin-bottom:10px'><b>${x.name}</b> · ${x.subtitle}<br><span class='small'>${x.desc}</span><br><a target='_blank' href='${x.mapUrl}'>지도</a></div>`).join('');
  $('#weather').innerHTML=`현재 ${state.weather.current.tempC}°C / 체감 ${state.weather.current.feelsLikeC}°C / ${state.weather.current.condition}<br><span class='small'>${state.weather.summary}</span><ul>${state.weather.forecast.map(d=>`<li>${d.date}: ${d.minC}~${d.maxC}°C · ${d.condition} · 비확률 ${d.chanceOfRain}%</li>`).join('')}</ul><a target='_blank' href='https://wttr.in/Boston?format=j1'>날씨 근거</a>`;
  $('#checklist').innerHTML=`<ul>${state.checklist.map(x=>`<li>${x}</li>`).join('')}</ul>`;
  $('#transport').innerHTML=`공항↔도심: ${state.transport.airportToCity}<br>결제: ${state.transport.payment}<ul>${(state.transport.tips||[]).map(x=>`<li>${x}</li>`).join('')}</ul><a target='_blank' href='${state.transport.officialUrl}'>공식 교통 링크</a>`;
  $('#sources').innerHTML=state.sources.map(x=>`<a target='_blank' href='${x.url}'>${x.name}</a>`).join('');
}
function printThemePdf(){
  const oldTitle=document.title;
  const label=document.querySelector('[data-theme].on')?.textContent||state.theme;
  document.title=`보스턴-${label}-가이드`;
  window.print();
  setTimeout(()=>{document.title=oldTitle;},300);
}
load();
</script>
</body>
</html>
